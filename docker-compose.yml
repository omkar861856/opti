services:
  ecotron-opti:
    build: .
    container_name: ecotron-opti
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.ecotron-opti.rule=Host(`opti.ecotron.co.in`)"
      - "traefik.http.routers.ecotron-opti.entrypoints=websecure"
      - "traefik.http.routers.ecotron-opti.tls.certresolver=myresolver"
      - "traefik.http.services.ecotron-opti.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
